name: Build GhostFile (all platforms)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: GhostFile-linux
            pyinstaller_args: --onefile --name GhostFile
          - os: windows-latest
            asset_name: GhostFile.exe
            pyinstaller_args: --onefile --name GhostFile.exe
          - os: macos-latest
            asset_name: GhostFile-macos
            pyinstaller_args: --onefile --name GhostFile

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} GhostFile.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/GhostFile*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GhostFile-linux
            GhostFile.exe
            GhostFile-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
